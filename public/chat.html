<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Beats Market - Support Chat</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 6rem auto 2rem;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 0;
            overflow: hidden;
        }
        
        .chat-header {
            background: #000;
            color: #fff;
            padding: 1rem;
            text-align: center;
            position: relative;
        }
        
        .back-to-shop {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        .back-to-shop:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .chat-header h2 {
            font-size: 1.2rem;
            margin: 0;
        }
        
        .chat-header p {
            font-size: 0.8rem;
            margin: 0.3rem 0 0;
            opacity: 0.8;
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
            background: #f8f8f8;
        }
        
        .message {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
        }
        
        .message.user {
            align-items: flex-end;
        }
        
        .message.support {
            align-items: flex-start;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 0.8rem 1rem;
            border-radius: 0;
            word-wrap: break-word;
        }
        
        .message.user .message-bubble {
            background: #000;
            color: #fff;
        }
        
        .message.support .message-bubble {
            background: #e0e0e0;
            color: #000;
        }
        
        .message-time {
            font-size: 0.7rem;
            color: #999;
            margin-top: 0.2rem;
        }
        
        .chat-input-area {
            display: flex;
            padding: 1rem;
            border-top: 1px solid #e0e0e0;
            background: #fff;
        }
        
        .chat-input-area input {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid #e0e0e0;
            margin-right: 0.5rem;
            font-size: 0.9rem;
        }
        
        .chat-input-area button {
            padding: 0.8rem 1.5rem;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        .chat-input-area button:hover {
            background: #333;
        }
        
        .typing-indicator {
            color: #999;
            font-size: 0.8rem;
            padding: 0.5rem;
            font-style: italic;
        }
        
        .chat-status {
            padding: 0.5rem 1rem;
            background: #fff3cd;
            color: #856404;
            text-align: center;
            font-size: 0.8rem;
        }
        
        .chat-status.connected {
            background: #d4edda;
            color: #155724;
        }
        
        .chat-status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        
        @media (max-width: 768px) {
            .chat-container {
                margin: 5rem 1rem 1rem;
            }
            
            .message-bubble {
                max-width: 85%;
            }
            
            .back-to-shop {
                position: static;
                transform: none;
                margin-bottom: 0.5rem;
                display: inline-block;
            }
            
            .chat-header {
                padding: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div id="navbar"></div>
    
    <div class="chat-container">
        <div class="chat-header">
            <button class="back-to-shop" onclick="window.location.href='/shop'" data-i18n="back">← BACK TO SHOP</button>
            <h2 data-i18n="chat">💬 Support Chat</h2>
            <p>We're here to help!</p>
        </div>
        
        <div id="chatStatus" class="chat-status">Connecting...</div>
        
        <div id="chatMessages" class="chat-messages">
            <div class="message support">
                <div class="message-bubble">
                    Welcome to Beats Market Support! How can we help you today?
                </div>
                <div class="message-time">Just now</div>
            </div>
        </div>
        
        <div id="typingIndicator" class="typing-indicator" style="display: none;">Support is typing...</div>
        
        <div class="chat-input-area">
            <input type="text" id="chatInput" data-i18n="typeMessage" placeholder="Type your message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" data-i18n="send">Send</button>
        </div>
    </div>
    
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="login">LOGIN</h2>
            <input type="email" id="loginEmail" data-i18n="emailPlaceholder" placeholder="EMAIL" class="form-input">
            <input type="password" id="loginPassword" data-i18n="passwordPlaceholder" placeholder="PASSWORD" class="form-input">
            <button class="btn" onclick="handleLogin()" data-i18n="login">LOGIN</button>
            <button class="nav-btn" onclick="closeModal()" data-i18n="close">CLOSE</button>
        </div>
    </div>
    
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="register">REGISTER</h2>
            <input type="text" id="regUsername" data-i18n="usernamePlaceholder" placeholder="USERNAME" class="form-input">
            <input type="email" id="regEmail" data-i18n="emailPlaceholder" placeholder="EMAIL" class="form-input">
            <input type="password" id="regPassword" data-i18n="passwordPlaceholder" placeholder="PASSWORD" class="form-input">
            <button class="btn" onclick="handleRegister()" data-i18n="register">REGISTER</button>
            <button class="nav-btn" onclick="closeModal()" data-i18n="close">CLOSE</button>
        </div>
    </div>
    
    <script src="/js/player.js" defer></script>
    <script src="/js/cart.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/app.js" defer></script>
    <script>
        let socket = null;
        let reconnectAttempts = 0;
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            socket = new WebSocket(wsUrl);
            
            socket.onopen = () => {
                console.log('WebSocket connected');
                const statusEl = document.getElementById('chatStatus');
                statusEl.textContent = 'Connected - Online';
                statusEl.className = 'chat-status connected';
                reconnectAttempts = 0;
            };
            
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'message') {
                    addMessage(data.message, data.sender === 'user' ? 'user' : 'support', data.timestamp);
                } else if (data.type === 'typing') {
                    const typingIndicator = document.getElementById('typingIndicator');
                    if (data.isTyping) {
                        typingIndicator.style.display = 'block';
                    } else {
                        typingIndicator.style.display = 'none';
                    }
                }
            };
            
            socket.onclose = () => {
                console.log('WebSocket disconnected');
                const statusEl = document.getElementById('chatStatus');
                statusEl.textContent = 'Disconnected - Reconnecting...';
                statusEl.className = 'chat-status disconnected';
                
                setTimeout(() => {
                    if (reconnectAttempts < 5) {
                        reconnectAttempts++;
                        connectWebSocket();
                    }
                }, 3000);
            };
            
            socket.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                alert('Not connected to chat server. Please try again later.');
                return;
            }
            
            const user = authManager.getUser();
            if (!user) {
                alert('Please login to use chat support');
                authManager.showLoginModal();
                return;
            }
            
            socket.send(JSON.stringify({
                type: 'message',
                message: message,
                sender: user.username,
                userId: user.id
            }));
            
            addMessage(message, 'user');
            input.value = '';
        }
        
        function addMessage(text, type, timestamp) {
            const messagesDiv = document.getElementById('chatMessages');
            const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `
                <div class="message-bubble">${escapeHtml(text)}</div>
                <div class="message-time">${time}</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        let typingTimeout;
        
        document.getElementById('chatInput').addEventListener('input', () => {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'typing', isTyping: true }));
                
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    socket.send(JSON.stringify({ type: 'typing', isTyping: false }));
                }, 1000);
            }
        });
        
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const result = await authManager.login(email, password);
            if (result.success) {
                closeModal();
                location.reload();
            } else {
                alert(result.error);
            }
        }
        
        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const result = await authManager.register(username, email, password);
            if (result.success) {
                alert('Registration successful! Please login.');
                closeModal();
            } else {
                alert(result.error);
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (authManager.getUser()) {
                connectWebSocket();
            }
        });
    </script>
</body>
</html>
