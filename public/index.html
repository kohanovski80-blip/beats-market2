<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Beats Market</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="home-page">
    <div class="home-container">
        <button class="shop-btn" data-i18n="shop" onclick="window.location.href='/shop'">SHOP</button>
        <a href="https://www.instagram.com/fury_fprod?igsh=NHEzYWh1MXdkZ201" target="_blank" class="instagram-btn">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.336 3.608 1.311.975.975 1.249 2.242 1.311 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.336 2.633-1.311 3.608-.975.975-2.242 1.249-3.608 1.311-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.336-3.608-1.311-.975-.975-1.249-2.242-1.311-3.608-.058-1.266-.07-1.646-.07-4.85s.012-3.584.07-4.85c.062-1.366.336-2.633 1.311-3.608.975-.975 2.242-1.249 3.608-1.311 1.266-.058 1.646-.07 4.85-.07zM12 0C8.741 0 8.332.014 7.052.072 5.775.13 4.905.334 4.14.63c-.78.304-1.44.71-2.1 1.37-.66.66-1.066 1.32-1.37 2.1-.296.765-.5 1.635-.558 2.912C.014 8.332 0 8.741 0 12c0 3.259.014 3.668.072 4.948.058 1.277.262 2.147.558 2.912.304.78.71 1.44 1.37 2.1.66.66 1.32 1.066 2.1 1.37.765.296 1.635.5 2.912.558 1.28.058 1.689.072 4.948.072s3.668-.014 4.948-.072c1.277-.058 2.147-.262 2.912-.558.78-.304 1.44-.71 2.1-1.37.66-.66 1.066-1.32 1.37-2.1.296-.765.5-1.635.558-2.912.058-1.28.072-1.689.072-4.948s-.014-3.668-.072-4.948c-.058-1.277-.262-2.147-.558-2.912-.304-.78-.71-1.44-1.37-2.1-.66-.66-1.32-1.066-2.1-1.37-.765-.296-1.635-.5-2.912-.558C15.668.014 15.259 0 12 0z" fill="white"/>
                <path d="M12 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8z" fill="white"/>
                <circle cx="18.406" cy="5.594" r="1.44" fill="white"/>
            </svg>
        </a>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="login">LOGIN</h2>
            <input type="email" id="loginEmail" data-i18n="emailPlaceholder" placeholder="EMAIL" class="form-input">
            <input type="password" id="loginPassword" data-i18n="passwordPlaceholder" placeholder="PASSWORD" class="form-input">
            <div class="form-group remember-me">
                <label>
                    <input type="checkbox" id="rememberCheckbox"> <span data-i18n="rememberMe">Remember me</span>
                </label>
            </div>
            <div class="login-links">
                <a href="#" onclick="closeModal(); showForgotPasswordModal(); return false;" class="forgot-link" data-i18n="forgotPassword">Forgot Password?</a>
            </div>
            <button class="btn" onclick="handleLogin()" data-i18n="login">LOGIN</button>
            <button class="nav-btn" onclick="closeModal()" data-i18n="close">CLOSE</button>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="register">REGISTER</h2>
            <input type="text" id="regUsername" data-i18n="usernamePlaceholder" placeholder="USERNAME" class="form-input">
            <input type="email" id="regEmail" data-i18n="emailPlaceholder" placeholder="EMAIL" class="form-input">
            <input type="password" id="regPassword" data-i18n="passwordPlaceholder" placeholder="PASSWORD" class="form-input">
            <button class="btn" onclick="handleRegister()" data-i18n="register">REGISTER</button>
            <button class="nav-btn" onclick="closeModal()" data-i18n="close">CLOSE</button>
        </div>
    </div>

    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="resetPassword">RESET PASSWORD</h2>
            <p>Enter your email to receive a password reset link</p>
            <input type="email" id="resetEmail" data-i18n="emailPlaceholder" placeholder="EMAIL" class="form-input">
            <button class="btn" onclick="requestPasswordReset()" data-i18n="sendResetLink">SEND RESET LINK</button>
            <button class="nav-btn" onclick="closeModal()" data-i18n="back">BACK TO LOGIN</button>
        </div>
    </div>

    <script src="/js/player.js" defer></script>
    <script src="/js/cart.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/app.js" defer></script>
    <script>
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberCheckbox')?.checked || false;
            const result = await authManager.login(email, password, remember);
            if (result.success) {
                closeModal();
                location.reload();
            } else {
                alert(result.error);
            }
        }
        
        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const result = await authManager.register(username, email, password);
            if (result.success) {
                alert('Registration successful! Please login.');
                closeModal();
            } else {
                alert(result.error);
            }
        }
        
        function showForgotPasswordModal() {
            closeModal();
            const modal = document.getElementById('forgotPasswordModal');
            if (modal) modal.style.display = 'flex';
        }
        
        async function requestPasswordReset() {
            const email = document.getElementById('resetEmail').value;
            if (!email) {
                alert('Please enter your email');
                return;
            }
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (data.success) {
                    alert('If an account exists with this email, you will receive a password reset link.');
                    closeModal();
                } else {
                    alert(data.error || 'Failed to send reset link');
                }
            } catch (error) {
                console.error('Password reset error:', error);
                alert('Network error. Please try again.');
            }
        }
</style>
</body>
</html>
