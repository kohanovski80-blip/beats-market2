<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Beats Market - Shop</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
    /* Принудительная адаптация для iPhone */
    @media (max-width: 768px) {
        .beats-grid {
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
        }
    }
</style>
</head>
<body>
    <div id="navbar"></div>
    <div class="container">
        <div id="beatsGrid" class="beats-grid"></div>
        <div id="pagination" class="pagination-container"></div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="login">LOGIN</h2>
            <input type="email" id="loginEmail" data-i18n="emailPlaceholder" placeholder="EMAIL" class="form-input">
            <input type="password" id="loginPassword" data-i18n="passwordPlaceholder" placeholder="PASSWORD" class="form-input">
            <button class="btn" onclick="handleLogin()" data-i18n="login">LOGIN</button>
            <button class="nav-btn" onclick="closeModal()" data-i18n="close">CLOSE</button>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="register">REGISTER</h2>
            <input type="text" id="regUsername" data-i18n="usernamePlaceholder" placeholder="USERNAME" class="form-input">
            <input type="email" id="regEmail" data-i18n="emailPlaceholder" placeholder="EMAIL" class="form-input">
            <input type="password" id="regPassword" data-i18n="passwordPlaceholder" placeholder="PASSWORD" class="form-input">
            <button class="btn" onclick="handleRegister()" data-i18n="register">REGISTER</button>
            <button class="nav-btn" onclick="closeModal()" data-i18n="close">CLOSE</button>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="uploadNewBeat">📤 UPLOAD BEAT</h2>
            <div class="form-group">
                <label data-i18n="beatTitle">BEAT TITLE</label>
                <input type="text" id="beatTitle" class="form-input" placeholder="e.g., Summer Vibes">
            </div>
            <div class="form-group">
                <label data-i18n="price">PRICE (USD)</label>
                <input type="number" id="beatPrice" class="form-input" placeholder="29.99">
            </div>
            <div class="form-group">
                <label data-i18n="audioFile">AUDIO FILE (MP3, WAV, M4A)</label>
                <input type="file" id="beatAudio" accept="audio/*" class="form-input">
            </div>
            <div class="form-group">
                <label data-i18n="coverImage">COVER IMAGE (optional)</label>
                <input type="file" id="beatCover" accept="image/*" class="form-input">
                <small style="color: #666;" data-i18n="coverSize">Recommended size: 500x500px (JPG, PNG, GIF, WEBP)</small>
            </div>
            <button class="btn" onclick="uploadBeat()" data-i18n="uploadNewBeat">UPLOAD BEAT</button>
            <button class="nav-btn" onclick="closeModal()" data-i18n="cancel">CANCEL</button>
        </div>
    </div>

    <div id="statsModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="statistics">📊 STATISTICS</h2>
            <div id="statsContent"></div>
            <button class="nav-btn" onclick="closeModal()" data-i18n="close">CLOSE</button>
        </div>
    </div>

    <div id="rolesModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="manageRoles">👑 MANAGE ROLES</h2>
            <div id="usersList"></div>
            <button class="nav-btn" onclick="closeModal()" data-i18n="close">CLOSE</button>
        </div>
    </div>

    <div id="adminPanelModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="adminPanel">ADMIN PANEL</h2>
            <div class="admin-buttons">
                <button class="btn" onclick="showUploadModal()" data-i18n="uploadNewBeat">UPLOAD BEAT</button>
                <button class="btn" onclick="showStatistics()" data-i18n="statistics">STATISTICS</button>
                <button class="btn" onclick="showManageRoles()" data-i18n="manageRoles">MANAGE ROLES</button>
            </div>
            <button class="nav-btn" onclick="closeModal()" data-i18n="close">CLOSE</button>
        </div>
    </div>

    <script src="/js/player.js" defer></script>
    <script src="/js/cart.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/app.js" defer></script>
    <script>
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const result = await authManager.login(email, password);
            if (result.success) {
                closeModal();
                location.reload();
            } else {
                alert(result.error);
            }
        }
        
        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const result = await authManager.register(username, email, password);
            if (result.success) {
                alert('Registration successful! Please login.');
                closeModal();
            } else {
                alert(result.error);
            }
        }
    </script>
</body>
</html>
